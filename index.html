<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de Pedidos — Fondo Creativo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0f0e0c;
    --surface:  #1a1815;
    --card:     #211f1b;
    --border:   #2e2b26;
    --gold:     #c9a84c;
    --gold-dim: #8a6e2f;
    --cream:    #f2ead8;
    --muted:    #7a7060;
    --text:     #e8dfc8;
    --accent:   #d4845a;
    --green:    #6aaa7a;
    --red:      #d46a6a;
    --blue:     #5a9fd4;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── PIN OVERLAY ── */
  #pinOverlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    gap: 20px;
  }

  .pin-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 90%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  .pin-icon { font-size: 48px; margin-bottom: 16px; }

  .pin-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--cream);
    margin-bottom: 8px;
  }

  .pin-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  #pinInput {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 32px;
    padding: 16px;
    border-radius: 12px;
    text-align: center;
    letter-spacing: 8px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color .2s;
  }

  #pinInput:focus { border-color: var(--gold); }

  #pinBtn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), var(--accent));
    color: #0f0e0c;
    border: none;
    padding: 12px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .2s;
  }

  #pinBtn:hover { transform: translateY(-2px); }

  #pinError {
    display: none;
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--gold), var(--accent));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo h1 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--cream); }
  .logo p  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }

  .header-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .search-box {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    outline: none;
    width: 240px;
    transition: border-color .2s;
  }

  .search-box:focus { border-color: var(--gold-dim); }

  .logout-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }

  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── MAIN ── */
  main { padding: 32px 40px; max-width: 1400px; margin: 0 auto; display: none; }

  /* ── FILTROS ── */
  .filter-bar {
    display: flex;
    gap: 14px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .filter-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  select {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    outline: none;
    transition: all .2s;
  }

  select:hover, select:focus { border-color: var(--gold-dim); }

  /* ── SECCIONES ── */
  .section {
    margin-bottom: 40px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--cream);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-badge {
    background: var(--gold);
    color: #0f0e0c;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* ── CARDS GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 18px;
  }

  .order-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: all .2s;
    cursor: pointer;
  }

  .order-card:hover { border-color: var(--gold-dim); transform: translateY(-2px); }

  .order-header {
    background: linear-gradient(135deg, var(--gold), var(--accent));
    color: #0f0e0c;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
  }

  .order-number { font-size: 15px; }

  .order-body { padding: 16px; }

  .order-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 13px;
  }

  .order-label {
    color: var(--muted);
    font-weight: 600;
    min-width: 90px;
    flex-shrink: 0;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.5px;
  }

  .order-value { color: var(--text); flex: 1; line-height: 1.4; }

  .order-value.highlight { color: var(--gold); font-weight: 600; }

  /* Estado badge en card */
  .status-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 4px;
  }

  .status-pendiente   { background: rgba(212, 106, 106, 0.2); color: var(--red); }
  .status-proceso     { background: rgba(212, 132, 90, 0.2);  color: var(--accent); }
  .status-enviado     { background: rgba(90, 159, 212, 0.2);  color: var(--blue); }
  .status-entregado   { background: rgba(106, 170, 122, 0.2); color: var(--green); }
  .status-anulado     { background: rgba(122, 112, 96, 0.2);  color: var(--muted); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9998;
    padding: 20px;
  }

  .modal-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 540px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 28px;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 28px;
    cursor: pointer;
    transition: color .2s;
  }

  .modal-close:hover { color: var(--text); }

  .modal-header {
    background: linear-gradient(135deg, var(--gold), var(--accent));
    color: #0f0e0c;
    padding: 16px;
    margin: -28px -28px 20px -28px;
    border-radius: 16px 16px 0 0;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-section {
    margin-bottom: 18px;
  }

  .modal-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .modal-row {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .modal-label {
    color: var(--muted);
    font-weight: 600;
    min-width: 110px;
    flex-shrink: 0;
    text-transform: uppercase;
    font-size: 11px;
  }

  .modal-value { color: var(--text); flex: 1; line-height: 1.4; word-break: break-word; }

  /* ── LOADER ── */
  #loader {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text { color: var(--muted); font-size: 14px; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  .empty-title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--cream); margin-bottom: 6px; }

  /* ── RESPONSIVE ── */
  @media(max-width: 900px) {
    header, main { padding-left: 20px; padding-right: 20px; }
    .cards-grid { grid-template-columns: 1fr; }
    .search-box { width: auto; }
  }

  @media(max-width: 600px) {
    .order-card { font-size: 12px; }
    .order-row { margin-bottom: 8px; }
  }
</style>
</head>
<body>

<!-- PIN OVERLAY -->
<div id="pinOverlay">
  <div class="pin-container">
    <div class="pin-icon">🔐</div>
    <div class="pin-title">Acceso Restringido</div>
    <div class="pin-subtitle">Ingresa tu PIN de 4 dígitos</div>
    <input type="password" id="pinInput" maxlength="4" placeholder="••••" inputmode="numeric">
    <button id="pinBtn">Acceder</button>
    <div id="pinError">PIN incorrecto, intenta de nuevo</div>
  </div>
</div>

<!-- HEADER -->
<header id="topMenu" style="display:none;">
  <div class="logo">
    <div class="logo-icon">📦</div>
    <div>
      <h1>Fondo Creativo</h1>
      <p>Seguimiento de Pedidos</p>
    </div>
  </div>
  <div class="header-actions">
    <input type="text" id="searchBox" class="search-box" placeholder="🔍 Buscar pedido, nombre…">
    <button class="logout-btn" onclick="logout()">Salir</button>
  </div>
</header>

<!-- MAIN -->
<main id="mainContent">

  <div id="loader">
    <div class="spinner"></div>
    <div class="loader-text">Cargando pedidos…</div>
  </div>

  <!-- PENDIENTES DE ENVÍO -->
  <div class="section" id="secPendiente" style="display:none;">
    <div class="section-title">
      📋 Pendientes de Envío
      <span class="section-badge" id="countPendiente">0</span>
    </div>
    <div class="cards-grid" id="listPendiente"></div>
  </div>

  <!-- EN PROCESO / PRODUCCIÓN / EN RUTA -->
  <div class="section" id="secProceso" style="display:none;">
    <div class="section-title">
      ⚙️ En Proceso / En Ruta
      <span class="section-badge" id="countProceso">0</span>
    </div>
    <div class="cards-grid" id="listProceso"></div>
  </div>

  <!-- ENTREGADOS / HISTORIAL -->
  <div class="section" id="secHistorial" style="display:none;">
    <div class="section-title">
      ✅ Historial (Entregados / Anulados)
      <span class="section-badge" id="countHistorial">0</span>
    </div>
    <div class="filter-bar">
      <span class="filter-label">Filtrar por mes:</span>
      <select id="filtroMes" onchange="renderizar()">
        <option value="all">Todos los meses</option>
      </select>
    </div>
    <div class="cards-grid" id="listHistorial"></div>
  </div>

  <div id="emptyState" class="empty-state" style="display:none;">
    <div class="empty-icon">📭</div>
    <div class="empty-title">Sin pedidos</div>
    <div>No hay pedidos que mostrar</div>
  </div>

</main>

<!-- MODAL -->
<div id="modalOverlay" class="modal-overlay">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const API_GET = "/.netlify/functions/getPedidos";
const PIN_CORRECTO = "0324";
const CADUCIDAD_HORAS = 24;

let pedidosGlobal = [];
const MESES_NOM = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

// ── PIN ──────────────────────────────────────────────────────────────────────
function validarPIN() {
  const input = document.getElementById('pinInput').value.trim();
  const error = document.getElementById('pinError');

  if (input === PIN_CORRECTO) {
    localStorage.setItem('pin_ok', 'true');
    localStorage.setItem('pin_time', Date.now().toString());
    document.getElementById('pinOverlay').style.display = 'none';
    document.getElementById('topMenu').style.display = 'flex';
    document.getElementById('loader').style.display = 'flex';
    cargarPedidos();
    error.style.display = 'none';
  } else {
    error.style.display = 'block';
  }
}

function comprobarPIN() {
  const ok = localStorage.getItem('pin_ok');
  const time = Number(localStorage.getItem('pin_time') || 0);
  const ahora = Date.now();

  if (ok === 'true' && time) {
    const horas = (ahora - time) / (1000 * 60 * 60);
    if (horas < CADUCIDAD_HORAS) {
      document.getElementById('pinOverlay').style.display = 'none';
      document.getElementById('topMenu').style.display = 'flex';
      document.getElementById('loader').style.display = 'flex';
      cargarPedidos();
      return;
    }
  }
  document.getElementById('pinOverlay').style.display = 'flex';
}

function logout() {
  localStorage.removeItem('pin_ok');
  localStorage.removeItem('pin_time');
  location.reload();
}

// ── CARGA DE DATOS ───────────────────────────────────────────────────────────
async function cargarPedidos() {
  try {
    const res = await fetch(API_GET);
    if (!res.ok) throw new Error('Error HTTP ' + res.status);
    pedidosGlobal = await res.json();
    if (!Array.isArray(pedidosGlobal)) throw new Error('Formato inválido');

    llenarMeses();
    renderizar();

    document.getElementById('loader').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
  } catch (err) {
    console.error(err);
    document.getElementById('loader').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
  }
}

// ── LLENAR MESES ────────────────────────────────────────────────────────────
function llenarMeses() {
  const meses = new Set();
  pedidosGlobal.forEach(p => {
    const f = p.Fecha;
    if (f) {
      const m = parseMes(f);
      if (m) meses.add(m);
    }
  });

  const selectMes = document.getElementById('filtroMes');
  [...meses].sort((a,b)=>a-b).forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = MESES_NOM[m] || m;
    selectMes.appendChild(opt);
  });
}

function parseMes(f) {
  if (!f) return null;
  const dt = new Date(f);
  return isNaN(dt) ? null : dt.getMonth() + 1;
}

// ── RENDERIZAR ──────────────────────────────────────────────────────────────
function renderizar() {
  const mesFiltro = document.getElementById('filtroMes').value;

  const pendientes = pedidosGlobal.filter(p => {
    const estado = (p.Estado || '').trim().toUpperCase();
    return ['PENDIENTE ENVÍO', 'PENDIENTE'].includes(estado);
  });

  const proceso = pedidosGlobal.filter(p => {
    const estado = (p.Estado || '').trim().toUpperCase();
    return ['SUBLIMADO', 'EN PROCESO', 'EN RUTA', 'EN PRODUCCIÓN', 'COSTURA'].includes(estado);
  });

  let historial = pedidosGlobal.filter(p => {
    const estado = (p.Estado || '').trim().toUpperCase();
    return ['ENTREGADO', 'ENVIADO', 'EN DESTINO', 'ANULADO', 'ALMACEN'].includes(estado);
  });

  // Filtrar historial por mes
  if (mesFiltro !== 'all') {
    historial = historial.filter(p => {
      const m = parseMes(p.Fecha);
      return m == mesFiltro;
    });
  }

  // Mostrar/ocultar secciones
  document.getElementById('secPendiente').style.display = pendientes.length ? 'block' : 'none';
  document.getElementById('secProceso').style.display = proceso.length ? 'block' : 'none';
  document.getElementById('secHistorial').style.display = historial.length ? 'block' : 'none';

  document.getElementById('countPendiente').textContent = pendientes.length;
  document.getElementById('countProceso').textContent = proceso.length;
  document.getElementById('countHistorial').textContent = historial.length;

  renderCards('listPendiente', pendientes);
  renderCards('listProceso', proceso);
  renderCards('listHistorial', historial);

  configurarBusqueda();
}

function renderCards(containerId, pedidos) {
  const cont = document.getElementById(containerId);
  cont.innerHTML = '';

  pedidos.forEach(p => {
    const card = document.createElement('div');
    card.className = 'order-card';
    card.onclick = () => mostrarDetalle(p);

    const estado = (p.Estado || '—').trim().toUpperCase();
    const statusClass = getStatusClass(estado);
    const noPedido = p.NoPedido || p['No. Pedido'] || '—';

    card.innerHTML = `
      <div class="order-header">
        <span class="order-number">Pedido #${noPedido}</span>
        <span class="order-status">${estado}</span>
      </div>
      <div class="order-body">
        <div class="order-row">
          <span class="order-label">Cliente:</span>
          <span class="order-value">${p.Nombre || '—'}</span>
        </div>
        <div class="order-row">
          <span class="order-label">Medidas:</span>
          <span class="order-value">${p.Ancho || '—'} × ${p.Alto || '—'}</span>
        </div>
        <div class="order-row">
          <span class="order-label">Fondo:</span>
          <span class="order-value highlight">${p.Fondo || '—'}</span>
        </div>
        <div class="order-row">
          <span class="order-label">Agencia:</span>
          <span class="order-value">${p.Agencia || '—'}</span>
        </div>
        <div class="order-row">
          <span class="order-label">Estado:</span>
          <span class="status-badge ${statusClass}">${estado}</span>
        </div>
      </div>
    `;

    cont.appendChild(card);
  });
}

function getStatusClass(estado) {
  if (estado.includes('PENDIENTE')) return 'status-pendiente';
  if (estado.includes('PROCESO') || estado.includes('RUTA') || estado.includes('PRODUCCIÓN') || estado.includes('SUBLIMADO') || estado.includes('COSTURA')) return 'status-proceso';
  if (estado.includes('ENVIADO') || estado.includes('DESTINO')) return 'status-enviado';
  if (estado.includes('ENTREGADO') || estado.includes('ALMACEN')) return 'status-entregado';
  if (estado.includes('ANULADO')) return 'status-anulado';
  return 'status-proceso';
}

// ── MODAL ───────────────────────────────────────────────────────────────────
function mostrarDetalle(p) {
  const estado = (p.Estado || '—').trim().toUpperCase();
  const noPedido = p.NoPedido || p['No. Pedido'] || '—';
  const pagado = p.Observaciones ? (p.Observaciones.toUpperCase().includes('PAGADO') ? 'Sí' : 'No') : '—';

  let html = `
    <div class="modal-header">
      Pedido #${noPedido}
      <span class="status-badge ${getStatusClass(estado)}" style="margin-left:auto;">${estado}</span>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">📋 Información del Pedido</div>
      <div class="modal-row"><span class="modal-label">Fecha:</span><span class="modal-value">${p.Fecha ? new Date(p.Fecha).toLocaleDateString('es-PE') : '—'}</span></div>
      <div class="modal-row"><span class="modal-label">Código Prod:</span><span class="modal-value">${p.CodigoProduccion || '—'}</span></div>
      <div class="modal-row"><span class="modal-label">Fondo:</span><span class="modal-value">${p.Fondo || '—'}</span></div>
      <div class="modal-row"><span class="modal-label">Medidas:</span><span class="modal-value">${p.Ancho || '—'} × ${p.Alto || '—'}</span></div>
      <div class="modal-row"><span class="modal-label">Especif.:</span><span class="modal-value">${p.Especificaciones || '—'}</span></div>
      <div class="modal-row"><span class="modal-label">Metraje:</span><span class="modal-value">${p.Metraje || '—'} m²</span></div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">👤 Información del Cliente</div>
      <div class="modal-row"><span class="modal-label">Nombre:</span><span class="modal-value">${p.Nombre || '—'}</span></div>
      <div class="modal-row"><span class="modal-label">DNI/RUC:</span><span class="modal-value">${p.Dni || '—'}</span></div>
      <div class="modal-row"><span class="modal-label">Teléfono:</span><span class="modal-value">${p.Telefono || '—'}</span></div>
      <div class="modal-row"><span class="modal-label">Dirección:</span><span class="modal-value">${p.Direccion || '—'}</span></div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">🚚 Envío & Pago</div>
      <div class="modal-row"><span class="modal-label">Agencia:</span><span class="modal-value">${p.Agencia || '—'}</span></div>
      <div class="modal-row"><span class="modal-label">Clave Recojo:</span><span class="modal-value">${p.Crecojo || '—'}</span></div>
      <div class="modal-row"><span class="modal-label">Monto:</span><span class="modal-value">S/ ${p.Monto || '—'}</span></div>
      <div class="modal-row"><span class="modal-label">Pagado:</span><span class="modal-value">${pagado}</span></div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">📊 Producción</div>
      <div class="modal-row"><span class="modal-label">Sublimado:</span><span class="modal-value">${p.Sublimado || '—'}</span></div>
      <div class="modal-row"><span class="modal-label">Costura:</span><span class="modal-value">${p.Costura || '—'}</span></div>
      <div class="modal-row"><span class="modal-label">Entrega:</span><span class="modal-value">${p.Entrega || '—'}</span></div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">📝 Notas</div>
      <div class="modal-row"><span class="modal-label">Observ.:</span><span class="modal-value">${p.Observaciones || '—'}</span></div>
    </div>
  `;

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal() { 
  document.getElementById('modalOverlay').style.display = 'none'; 
}

function configurarBusqueda() {
  const searchBox = document.getElementById('searchBox');
  if (!searchBox.hasListener) {
    searchBox.addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll('.order-card').forEach(card => {
        const texto = card.textContent.toLowerCase();
        card.style.display = texto.includes(q) ? 'block' : 'none';
      });
    });
    searchBox.hasListener = true;
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  comprobarPIN();
  document.getElementById('pinBtn').addEventListener('click', validarPIN);
  document.getElementById('pinInput').addEventListener('keyup', e => {
    if (e.key === 'Enter') validarPIN();
  });
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target.id === 'modalOverlay') closeModal();
  });
});
</script>
</body>
</html>
